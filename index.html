<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VSR Staffing Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3ff;
overflow-x:hidden;
}

.header{
background:linear-gradient(rgba(0,40,160,0.92),rgba(0,20,100,0.92)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
padding:80px 20px;
text-align:center;
color:white;
}

.header h1{
font-size:55px;
font-weight:800;
}

.header p{
font-size:22px;
margin-top:10px;
}

.search-section{
padding:30px 20px;
margin-top:-45px;
}

.search-box{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:25px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.search-box input,
.search-box select{
padding:18px;
border:none;
outline:none;
background:#f1f5ff;
border-radius:15px;
font-size:16px;
}

.jobs-section{
padding:20px;
max-width:1400px;
margin:auto;
}

.jobs-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.job-card{
background:white;
padding:28px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
transition:0.3s;
}

.job-card:hover{
transform:translateY(-8px);
}

.job-card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:6px;
background:linear-gradient(90deg,#2563eb,#00b7ff);
}

.company{
font-size:14px;
font-weight:700;
color:#2563eb;
margin-bottom:15px;
}

.job-title{
font-size:34px;
font-weight:800;
margin-bottom:18px;
color:#111827;
}

.job-info{
font-size:18px;
margin-bottom:12px;
color:#4b5563;
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.tag{
padding:8px 15px;
background:#dbeafe;
color:#2563eb;
border-radius:50px;
font-size:14px;
font-weight:700;
}

.apply-btn{
width:100%;
margin-top:25px;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
font-size:20px;
font-weight:800;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:flex-start;
overflow-y:auto;
padding:40px 15px;
z-index:9999;
}

.popup-content{
width:100%;
max-width:500px;
background:white;
padding:30px;
border-radius:25px;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:18px;
font-size:35px;
cursor:pointer;
}

.popup h2{
text-align:center;
margin-bottom:25px;
color:#2563eb;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-box input,
.input-box select{
width:100%;
padding:15px;
border:none;
background:#f3f6ff;
border-radius:14px;
font-size:16px;
outline:none;
}

.submit-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#16a34a;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.footer{
margin-top:60px;
background:#071b63;
padding:35px 20px;
text-align:center;
color:white;
}

.whatsapp-btn{
position:fixed;
right:20px;
bottom:20px;
background:#22c55e;
color:white;
padding:16px 24px;
border-radius:60px;
text-decoration:none;
font-size:18px;
font-weight:700;
z-index:999;
}

@media(max-width:768px){

.header h1{
font-size:36px;
}

.header p{
font-size:16px;
}

.search-box{
grid-template-columns:1fr;
}

.job-title{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>VSR Staffing Services</h1>

<p>Find Latest Jobs in Hyderabad 🚀</p>

</div>

<section class="search-section">

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="🔍 Search Jobs...">

<select id="locationFilter">

<option value="">📍 All Locations</option>

<option>Hyderabad</option>
<option>Uppal</option>
<option>Miyapur</option>
<option>KPHB</option>
<option>Balanagar</option>

</select>

</div>

</section>

<section class="jobs-section">

<div class="jobs-grid" id="jobsGrid">

Loading Jobs...

</div>

</section>

<div class="popup" id="popup">

<div class="popup-content">

<span class="close-btn"
onclick="closePopup()">

×
</span>

<h2>Job Registration 🚀</h2>

<form id="jobForm">

<div class="input-box">
<label>Company Name</label>
<input type="text" id="companyName" name="company" readonly>
</div>

<div class="input-box">
<label>Job Role</label>
<input type="text" id="jobRole" name="job_role" readonly>
</div>

<div class="input-box">
<label>Location</label>
<input type="text" id="jobLocation" name="location" readonly>
</div>

<div class="input-box">
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text" name="phone" required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="input-box">
<label>Gender</label>

<select name="gender" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>

</div>

<div class="input-box">
<label>Qualification</label>

<select name="qualification">

<option>10th</option>
<option>Inter</option>
<option>Degree</option>
<option>BTech</option>

</select>

</div>

<button type="submit"
class="submit-btn"
id="submitBtn">

Submit Application

</button>

</form>

</div>

</div>

<div class="footer">

<h2>📞 Contact : 6305232525</h2>

<p>VSR Staffing Services | Hyderabad Staffing Solutions</p>

</div>

<a href="https://wa.me/916305232525"
class="whatsapp-btn">

WhatsApp

</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyARjD6pxfDGkQQSWGZ-T3bOZiu4qa_SJkk",

authDomain: "vsr--staffing.firebaseapp.com",

projectId: "vsr--staffing",

storageBucket: "vsr--staffing.firebasestorage.app",

messagingSenderId: "105296080631",

appId: "1:105296080631:web:29a610f720cfa60032edf2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const jobsGrid =
document.getElementById("jobsGrid");

let allJobs = [];

async function loadJobs(){

jobsGrid.innerHTML =
"Loading Jobs...";

try{

const querySnapshot =
await getDocs(collection(db,"venu"));

allJobs = [];

querySnapshot.forEach((doc)=>{

allJobs.push(doc.data());

});

displayJobs(allJobs);

}catch(error){

console.log(error);

jobsGrid.innerHTML =
"Error Loading Jobs";

}

}

function displayJobs(jobs){

jobsGrid.innerHTML = "";

if(jobs.length === 0){

jobsGrid.innerHTML =
"No Jobs Available";

return;

}

jobs.forEach((job)=>{

jobsGrid.innerHTML += `

<div class="job-card">

<div class="company">
${job.company || "Company Hiring"}
</div>

<div class="job-title">
${job.Title || job.title}
</div>

<div class="job-info">
💰 Salary : ₹${job.salary}
</div>

<div class="job-info">
📍 Location : ${job.Location || job.location}
</div>

<div class="job-info">
🕒 Full Time
</div>

<div class="tags">
<div class="tag">Hiring</div>
<div class="tag">Apply Fast</div>
</div>

<button class="apply-btn"
onclick="openPopup(
'${job.company || ""}',
'${job.Title || job.title}',
'${job.Location || job.location}'
)">

Apply Now

</button>

</div>

`;

});

}

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keyup",()=>{

const value =
searchInput.value.toLowerCase();

const filtered =
allJobs.filter(job=>

(job.Title || job.title || "")
.toLowerCase()
.includes(value)

||

(job.Location || job.location || "")
.toLowerCase()
.includes(value)

);

displayJobs(filtered);

});

window.openPopup = function(company,job,location){

document.getElementById("popup").style.display="flex";

document.getElementById("companyName").value=company;

document.getElementById("jobRole").value=job;

document.getElementById("jobLocation").value=location;

}

window.closePopup = function(){

document.getElementById("popup").style.display="none";

}

const scriptURL =
"https://script.google.com/macros/s/AKfycbyAsqafWijN2RUII-Cz1dcGx5O2HC_La2HvEVy1PNxT-p7GPdjMKVFdK7lPNDDI4TGG/exec";

const form =
document.getElementById("jobForm");

const submitBtn =
document.getElementById("submitBtn");

let isSubmitting = false;

form.addEventListener("submit", async (e)=>{

e.preventDefault();

if(isSubmitting) return;

isSubmitting = true;

submitBtn.disabled = true;

submitBtn.innerText = "Submitting...";

try{

await fetch(scriptURL,{

method:"POST",

body:new FormData(form)

});

alert("Application Submitted Successfully");

form.reset();

closePopup();

}catch(error){

alert("Error Submitting Form");

}

submitBtn.disabled = false;

submitBtn.innerText = "Submit Application";

isSubmitting = false;

});

loadJobs();

</script>

</body>
</html>
