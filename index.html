<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VSR Staffing Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3ff;
overflow-x:hidden;
}

/* HEADER */

.header{
background:
linear-gradient(rgba(0,40,160,0.92),rgba(0,20,100,0.92)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

padding:80px 20px;
text-align:center;
color:white;
}

.header h1{
font-size:58px;
font-weight:800;
margin-bottom:12px;
}

.header p{
font-size:22px;
opacity:0.95;
}

/* SEARCH */

.search-section{
padding:30px 20px;
margin-top:-45px;
}

.search-box{
max-width:1250px;
margin:auto;
background:white;
padding:25px;
border-radius:28px;
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.search-box input,
.search-box select{
padding:18px;
border:none;
outline:none;
background:#f1f5ff;
border-radius:16px;
font-size:16px;
font-weight:500;
}

/* JOBS */

.jobs-section{
padding:20px;
max-width:1450px;
margin:auto;
}

.jobs-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
gap:28px;
}

/* CARD */

.job-card{
background:white;
padding:28px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.35s;
position:relative;
overflow:hidden;
}

.job-card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:6px;
background:linear-gradient(90deg,#2563eb,#00b7ff);
}

.job-card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(37,99,235,0.18);
}

.company{
font-size:14px;
font-weight:700;
color:#2563eb;
margin-bottom:16px;
}

.job-title{
font-size:32px;
font-weight:800;
line-height:1.1;
margin-bottom:20px;
color:#111827;
}

.job-info{
font-size:17px;
margin-bottom:13px;
color:#4b5563;
font-weight:500;
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.tag{
padding:9px 16px;
background:#dbeafe;
color:#2563eb;
border-radius:50px;
font-size:14px;
font-weight:700;
}

.apply-btn{
width:100%;
margin-top:28px;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
font-size:20px;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.apply-btn:hover{
transform:scale(1.02);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
display:none;
justify-content:center;
align-items:flex-start;
overflow-y:auto;
padding:40px 15px;
z-index:9999;
}

.popup-content{
width:100%;
max-width:500px;
background:white;
padding:30px;
border-radius:25px;
position:relative;
margin:auto;
animation:pop 0.3s ease;
}

.close-btn{
position:absolute;
top:10px;
right:18px;
font-size:35px;
cursor:pointer;
}

.popup h2{
text-align:center;
margin-bottom:25px;
color:#2563eb;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-box input,
.input-box select{
width:100%;
padding:15px;
border:none;
background:#f3f6ff;
border-radius:14px;
font-size:16px;
outline:none;
}

.submit-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#16a34a;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.success-page{
display:none;
text-align:center;
padding:20px;
}

.success-page h1{
color:#16a34a;
margin-bottom:12px;
}

/* FOOTER */

.footer{
margin-top:60px;
background:#071b63;
padding:35px 20px;
text-align:center;
color:white;
}

.footer h2{
font-size:28px;
margin-bottom:10px;
}

/* WHATSAPP */

.whatsapp-btn{
position:fixed;
right:20px;
bottom:20px;
background:#22c55e;
color:white;
padding:16px 24px;
border-radius:60px;
text-decoration:none;
font-size:18px;
font-weight:700;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
z-index:999;
}

/* MOBILE */

@media(max-width:768px){

.header{
padding:70px 15px;
}

.header h1{
font-size:36px;
}

.header p{
font-size:16px;
}

.search-box{
grid-template-columns:1fr;
padding:18px;
}

.job-card{
padding:24px;
}

.job-title{
font-size:26px;
}

.apply-btn{
font-size:18px;
padding:15px;
}

.whatsapp-btn{
font-size:15px;
padding:14px 18px;
}

}

@keyframes pop{

0%{
transform:scale(0.8);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>
VSR Staffing Services
</h1>

<p>
Find Latest Jobs in Hyderabad 🚀
</p>

</div>

<!-- SEARCH -->

<section class="search-section">

<div class="search-box">

<input type="text" placeholder="🔍 Search Jobs...">

<select>
<option>📍 All Locations</option>
<option>Hyderabad</option>
<option>Uppal</option>
<option>Miyapur</option>
<option>Hitech City</option>
</select>

<select>
<option>💼 All Categories</option>
<option>HR</option>
<option>BPO</option>
<option>Admin</option>
<option>Sales</option>
</select>

</div>

</section>

<!-- JOBS -->

<section class="jobs-section">

<div class="jobs-grid">

<script>

const jobs = [

["HR Recruiter","Hyderabad","₹20,000"],
["Telecaller","Uppal","₹15,000"],
["Backend Executive","Hitech City","₹22,000"],
["Admin Executive","Madhapur","₹18,000"],
["Receptionist","Miyapur","₹16,000"],
["Data Entry Operator","Kukatpally","₹17,000"],
["Customer Support","Gachibowli","₹19,000"],
["Sales Executive","Ameerpet","₹25,000"],
["Accountant","Kondapur","₹28,000"],
["Warehouse Staff","Shamshabad","₹16,500"],
["Delivery Executive","Hyderabad","₹22,000"],
["BPO Executive","Miyapur","₹18,000"],
["Office Assistant","Begumpet","₹15,500"]

];

document.write(

jobs.map(job => `

<div class="job-card">

<div class="company">
VSR Staffing Services
</div>

<div class="job-title">
${job[0]}
</div>

<div class="job-info">
💰 Salary : ${job[2]}
</div>

<div class="job-info">
📍 Location : ${job[1]}
</div>

<div class="job-info">
🕒 Full Time
</div>

<div class="tags">
<div class="tag">Hiring</div>
<div class="tag">Apply Fast</div>
</div>

<button class="apply-btn"
onclick="openPopup('${job[0]}','${job[1]}')">

Apply Now

</button>

</div>

`).join('')

);

</script>

</div>

</section>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-content">

<span class="close-btn"
onclick="closePopup()">

×

</span>

<div id="formSection">

<h2>Job Registration 🚀</h2>

<form id="jobForm">

<div class="input-box">
<label>Job Role</label>
<input type="text"
id="jobRole"
name="job_role"
readonly>
</div>

<div class="input-box">
<label>Location</label>
<input type="text"
id="jobLocation"
name="location"
readonly>
</div>

<div class="input-box">
<label>Full Name</label>
<input type="text"
name="name"
required>
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text"
name="phone"
required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date"
name="dob"
required>
</div>

<div class="input-box">
<label>Gender</label>

<select name="gender" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

<div class="input-box">
<label>Qualification</label>

<select name="qualification">

<option>10th</option>
<option>Inter</option>
<option>Degree</option>
<option>BTech</option>

</select>

</div>

<button type="submit"
class="submit-btn"
id="submitBtn">

Submit Application

</button>

</form>

</div>

<div class="success-page"
id="successPage">

<h1>
✅ Submitted Successfully
</h1>

<p>
HR Team Will Contact You Soon
</p>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<h2>
📞 Contact : 6305232525
</h2>

<p>
VSR Staffing Services | Hyderabad Staffing Solutions
</p>

</div>

<!-- WHATSAPP -->

<a href="https://wa.me/916305232525"
class="whatsapp-btn">

WhatsApp

</a>

<script>

function openPopup(job,location){

document.getElementById("popup").style.display="flex";

document.getElementById("jobRole").value=job;

document.getElementById("jobLocation").value=location;

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* GOOGLE SHEET */

const scriptURL =
"https://script.google.com/macros/s/AKfycbyAsqafWijN2RUII-Cz1dcGx5O2HC_La2HvEVy1PNxT-p7GPdjMKVFdK7lPNDDI4TGG/exec";

const form =
document.getElementById("jobForm");

const submitBtn =
document.getElementById("submitBtn");

let isSubmitting=false;

form.addEventListener("submit",function(e){

e.preventDefault();

if(isSubmitting) return;

isSubmitting=true;

submitBtn.disabled=true;

submitBtn.innerText="Submitting...";

fetch(scriptURL,{

method:"POST",
body:new FormData(form)

})

.then(response=>{

document.getElementById("formSection").style.display="none";

document.getElementById("successPage").style.display="block";

form.reset();

})

.catch(error=>{

alert("Error! Check Google Script");

})

.finally(()=>{

isSubmitting=false;

submitBtn.disabled=false;

submitBtn.innerText="Submit Application";

});

});

</script>

</body>
</html>
