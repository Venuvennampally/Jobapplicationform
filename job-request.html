<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VenuHR Job Request</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb}
.header{background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff;padding:30px 20px;text-align:center}
.wrap{max-width:700px;margin:20px auto;padding:15px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
input,textarea,button{width:100%;padding:14px;margin:8px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:10px}
button{background:#2563eb;color:#fff;border:none;font-weight:bold;cursor:pointer}
.statusBtn{background:#16a34a}
.note{font-size:14px;color:#666;text-align:center}
#success{display:none;text-align:center}
</style>
</head>
<body>
<div class="header">
<h1>VenuHR</h1>
<p>Company Job Request</p>
</div>

<div class="wrap">
<div class="card" id="formCard">
<h2>Submit Job Requirement</h2>

<form onsubmit="return validateForm()">
<input id="company" placeholder="Company Name *" required>
<input id="mobile" placeholder="Contact Number *" maxlength="10" required>
<input id="title" placeholder="Job Title *" required>
<textarea id="desc" placeholder="Job Description *" required></textarea>
<input id="location" placeholder="Job Location *" required>

<button type="submit">Submit Request</button>
</form>

<hr>

<h3>Already Submitted?</h3>
<p class="note">Check your request status using your mobile number.</p>

<a href="job-status.html">
<button type="button" class="statusBtn">🔍 Check Status</button>
</a>
</div>

<div class="card" id="success">
<h2>✅ Request Submitted Successfully</h2>
<p>Your request has been submitted.</p>
<p>Use your mobile number to check status.</p>
<a href="job-status.html">
<button>Check My Status</button>
</a>
</div>
</div>

<script>
function validateForm(){
 const mobile=document.getElementById('mobile').value.trim();

 if(!/^[6-9]\d{9}$/.test(mobile)){
   alert('Enter valid 10 digit mobile number');
   return false;
 }

 document.getElementById('formCard').style.display='none';
 document.getElementById('success').style.display='block';

 return false;
}
</script>
</body>
</html>
