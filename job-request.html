<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VenuHR Job Request</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb}
.header{background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff;padding:30px 20px;text-align:center}
.wrap{max-width:700px;margin:20px auto;padding:15px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
input,textarea,button{width:100%;padding:14px;margin:8px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:10px}
button{background:#2563eb;color:#fff;border:none;font-weight:bold;cursor:pointer}
.statusBtn{background:#16a34a}
.note{font-size:14px;color:#666;text-align:center}
#success{display:none;text-align:center}
</style>
</head>
<body>
<div class="header">
<h1>VenuHR</h1>
<p>Company Job Request</p>
</div>

<div class="wrap">
<div class="card" id="formCard">
<h2>Submit Job Requirement</h2>

<input id="company" placeholder="Company Name *">
<input id="mobile" placeholder="Contact Number *" maxlength="10">
<input id="title" placeholder="Job Title *">
<input id="salary" placeholder="Salary *">
<select id="gender"><option value="Both">Both</option><option value="Male">Male</option><option value="Female">Female</option></select>
<select id="jobType"><option value="Full Time">Full Time</option><option value="Part Time">Part Time</option></select>
<textarea id="desc" placeholder="Job Description *"></textarea>
<input id="location" placeholder="Job Location *">

<button id="submitBtn">Submit Request</button>

<hr>
<h3>Already Submitted?</h3>
<p class="note">Check your request status using your mobile number.</p>
<a href="job-status.html"><button type="button" class="statusBtn">🔍 Check Status</button></a>
<div id="msg"></div>
</div>

<div class="card" id="success">
<h2>✅ Request Submitted Successfully</h2>
<p>Your request has been submitted.</p>
<p>Use your mobile number to check status.</p>
<a href="job-status.html"><button>Check My Status</button></a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore,collection,addDoc,serverTimestamp,getDocs,query,where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyARjD6pxfDGkQQSWGZ-T3bOZiu4qa_SJkk",
authDomain:"vsr--staffing.firebaseapp.com",
projectId:"vsr--staffing",
storageBucket:"vsr--staffing.firebasestorage.app",
messagingSenderId:"105296080631",
appId:"1:105296080631:web:29a610f720cfa60032edf2"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

document.getElementById("submitBtn").addEventListener("click", async ()=>{
 const msg=document.getElementById("msg");

 try{
   const company=document.getElementById("company").value.trim();
   const mobile=document.getElementById("mobile").value.trim();
   const title=document.getElementById("title").value.trim();
   const salary=document.getElementById("salary").value.trim();
   const gender=document.getElementById("gender").value;
   const jobType=document.getElementById("jobType").value;
   const desc=document.getElementById("desc").value.trim();
   const location=document.getElementById("location").value.trim();

   if(!company || !mobile || !title || !salary || !desc || !location){
      msg.innerHTML="⚠️ Fill all fields";
      return;
   }

   if(!/^[6-9]\d{9}$/.test(mobile)){
      msg.innerHTML="⚠️ Enter valid 10 digit mobile number";
      return;
   }

   const q=query(collection(db,"pending_jobs"),where("whatsapp","==",mobile));
   const existing=await getDocs(q);

   if(!existing.empty){
      msg.innerHTML="⚠️ Request already exists. Check Status.";
      return;
   }

   await addDoc(collection(db,"pending_jobs"),{
      companyName:company,
      whatsapp:mobile,
      title:title,
      salary:salary,
      gender:gender,
      jobType:jobType,
      description:desc,
      location:location,
      status:"Pending",
      createdAt:serverTimestamp()
   });

   document.getElementById("formCard").style.display="none";
   document.getElementById("success").style.display="block";

 }catch(e){
   msg.innerHTML="❌ "+e.message;
 }
});
</script>
</body>
</html>
